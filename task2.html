<!--Task – 2: Special Characters Reference Page 
 Task Statement: 
    Build an HTML page that lists and displays at least 20 HTML character entities. 
    Include entities for copyright (©), trademark (™), registered (®), greater-than (>), less-than (<), ampersand (&), non-breaking space, and currency symbols. 
    Organize them in a two-column layout using only HTML (no CSS). 
    Show both the entity code and the rendered character. -->
    
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special Characters Reference Page</title>
</head>
<body>
    
    <h1>Special Characters Reference Page</h1>

    <table border="1">
        <tr>
            <th>Entity Code</th>
            <th>Rendered Character</th>
        </tr>

        <tr>
            <td>&amp;copy;</td>
            <td>&copy;</td>
        </tr>

        <tr>
            <td>&amp;trade;</td>
            <td>&trade;</td>
        </tr>

        <tr>
            <td>&amp;reg;</td>
            <td>&reg;</td>
        </tr>

        <tr>
            <td>&amp;gt;</td>
            <td>&gt;</td>
        </tr>

        <tr>
            <td>&amp;lt;</td>
            <td>&lt;</td>
        </tr>

        <tr>
            <td>&amp;amp;</td>
            <td>&amp;</td>
        </tr>

        <tr>
            <td>&amp;nbsp;</td>
            <td>Word&nbsp;Word</td>
        </tr>

        <tr>
            <td>&amp;euro;</td>
            <td>&euro;</td>
        </tr>

        <tr>
            <td>&amp;pound;</td>
            <td>&pound;</td>
        </tr>

        <tr>
            <td>&amp;yen;</td>
            <td>&yen;</td>
        </tr>

        <tr>
            <td>&amp;cent;</td>
            <td>&cent;</td>
        </tr>

        <tr>
            <td>&amp;sect;</td>
            <td>&sect;</td>
        </tr>

        <tr>
            <td>&amp;para;</td>
            <td>&para;</td>
        </tr>

        <tr>
            <td>&amp;deg;</td>
            <td>&deg;</td>
        </tr>

        <tr>
            <td>&amp;plusmn;</td>
            <td>&plusmn;</td>
        </tr>

        <tr>
            <td>&amp;times;</td>
            <td>&times;</td>
        </tr>

        <tr>
            <td>&amp;divide;</td>
            <td>&divide;</td>
        </tr>

        <tr>
            <td>&amp;micro;</td>
            <td>&micro;</td>
        </tr>

        <tr>
            <td>&amp;quot;</td>
            <td>&quot;</td>
        </tr>

        <tr>
            <td>&amp;apos;</td>
            <td>&apos;</td>
        </tr>

    </table>

</body>
</html>
